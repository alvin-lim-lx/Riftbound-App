name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # Backend tests
      - name: Backend deps
        run: |
          cd backend && npm ci

      - name: Backend lint
        run: cd backend && npm run lint || true

      - name: Backend typecheck
        run: cd backend && npx tsc --noEmit || true

      # Frontend tests
      - name: Frontend deps
        run: |
          cd frontend && npm ci

      - name: Frontend typecheck
        run: cd frontend && npx tsc --noEmit || true

  docker-build:
    runs-on: ubuntu-latest
    needs: lint-and-test

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -f docker/Dockerfile -t riftbound:${{ github.sha }} .

      - name: Run Docker compose stack
        run: |
          cd docker && docker compose up -d postgres redis
          sleep 5
          docker compose up --build api
