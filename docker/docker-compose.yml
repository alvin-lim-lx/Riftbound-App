version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: riftbound
      POSTGRES_USER: rbuser
      POSTGRES_PASSWORD: rbpass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/src/db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  api:
    build:
      context: .
      dockerfile: docker/Dockerfile
    ports:
      - "3001:3001"
    environment:
      DATABASE_URL: postgresql://rbuser:rbpass@postgres:5432/riftbound
      REDIS_URL: redis://redis:6379
      PORT: 3001
      NODE_ENV: production
    depends_on:
      - postgres
      - redis

  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
    ports:
      - "3000:3000"
    environment:
      VITE_WS_URL: ws://api:3001

volumes:
  postgres_data:
